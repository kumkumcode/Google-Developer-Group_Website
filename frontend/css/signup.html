<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup | GDG CSMU</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #4285F4; --red: #EA4335; --yellow: #FBBC04; --green: #34A853; --dark: #202124; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Google Sans', sans-serif; background: #fff; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(#e2e4e7 1.5px, transparent 1.5px); background-size: 40px 40px;
        }
        .glow { position: absolute; width: 40vw; height: 40vw; border-radius: 50%; filter: blur(150px); opacity: 0.1; z-index: -1; animation: move 20s infinite alternate; }
        .g1 { background: var(--blue); top: -10%; left: -10%; }
        .g2 { background: var(--yellow); bottom: -10%; right: -10%; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.5); padding: 50px; border-radius: 40px;
            width: 480px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center;
        }
        .glass-card img { height: 45px; width: auto; margin-bottom: 20px; }
        h2 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 700; color: var(--dark); }
        p { color: #5f6368; margin-bottom: 30px; }
        
        input { width: 100%; padding: 16px 20px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-family: inherit; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(66,133,244,0.1); }
        
        .btn-primary { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(66, 133, 244, 0.2); }
    </style>
</head>
<body>
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="glass-card">
        <!-- Logo Image -->
        <a href="index.html">
            <img src="images/logo.png" alt="GDG Logo">
        </a>
        
        <h2>Signup</h2>
        <p>Start your journey with GDG CSMU</p>

        <form action="#">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="University Email" required>
            <input type="text" placeholder="Student ID / PRN" required>
            <input type="password" placeholder="Create Password" required>
            <button type="submit" class="btn-primary">Signup</button>
        </form>

        <!-- UPDATED LINK TEXT -->
        <p style="margin-top: 30px; color: #5f6368; font-size: 0.9rem;">
            Already a member? <a href="login.html" style="color: var(--blue); text-decoration: none; font-weight: 700;">Login</a>
        </p>
    </div>

<script>
    document.querySelector('form').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            fullName: e.target[0].value,
            email: e.target[1].value,
            studentId: e.target[2].value,

        };

</script>
</body>
</html>
