<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Login | GDG CSMU</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #4285F4; --red: #EA4335; --yellow: #FBBC04; --green: #34A853; --dark: #202124; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Google Sans', sans-serif; 
            background: #fff; height: 100vh; display: flex; overflow: hidden;
            background-image: radial-gradient(#e2e4e7 1.5px, transparent 1.5px); background-size: 40px 40px;
        }
        .glow { position: absolute; width: 40vw; height: 40vw; border-radius: 50%; filter: blur(150px); opacity: 0.1; z-index: -1; animation: move 20s infinite alternate; }
        .g1 { background: var(--blue); top: -10%; left: -10%; }
        .g2 { background: var(--green); bottom: -10%; right: -10%; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }
        .login-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-left: 8%; }
        .login-info img { height: 45px; width: auto; margin-bottom: 25px; align-self: flex-start; }
        .login-info h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 10px; line-height: 1; }
        .login-info p { color: #5f6368; font-size: 1.2rem; max-width: 400px; }
        .login-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.5); padding: 50px; border-radius: 40px;
            width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center;
        }
        input { width: 100%; padding: 16px 20px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 1rem; font-family: inherit; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(66,133,244,0.1); }
        .btn-login { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(66, 133, 244, 0.2); }
    </style>
</head>
<body>
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="login-info">
        <a href="index.html"><img src="images/logo.png" alt="GDG Logo"></a>
        <h1>Welcome <br> <span style="color: var(--blue);">Back.</span></h1>
        <p>Login to your GDG CSMU account to access member exclusive resources.</p>
    </div>
    <div class="login-container">
        <div class="glass-card">
            <h2 style="font-size: 2rem; margin-bottom: 30px; font-weight: 700;">Login</h2>
            <form action="#">
                <input type="email" placeholder="University Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <p style="margin-top: 30px; color: #5f6368; font-size: 0.9rem;">new here? <a href="signup.html" style="color: var(--blue); text-decoration: none; font-weight: 700;">signup</a></p>
        </div>
    </div>

<script>
    document.querySelector('form').onsubmit = async (e) => {
        e.preventDefault();

        // Getting data from your two inputs (email and password)
        const data = { 
            email: e.target[0].value, 
            password: e.target[1].value 
        };

        try {
            const response = await fetch('https://google-developer-group-website.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if(result.success) {
                // --- THIS IS WHERE WE SAVE THE NAME ---
                localStorage.setItem('userName', result.userName); 
                alert("✅ Welcome  " + result.userName);
                window.location.href = "index.html"; // Redirect to Home
            } else { 
                alert("❌ " + result.message); 
            }
        } catch (err) {
            console.error(err);
            alert("Connection error. Is your server running?");
        }
    };
</script>
</body>
</html>
